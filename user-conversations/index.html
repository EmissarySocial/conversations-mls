<div class="app" script="init send SelectNav(id:'conversations')">

	<!-- Metadata -->
	<link rel="icon" href="{{.IconURL}}"/>

	{{- if .IsMasquerading -}}

		<div class="pos-absolute-four-corners bg-stripes flex-center">
			<div class="card padding width-480 align-center">
				Administrators cannot view private conversations.
			</div>
		</div>

	{{- else -}}

		<link rel="stylesheet" href="/.templates/user-conversations/stylesheet">
		<div id="mls" class="width-100% flex-row" data-actor-id="{{.ActorURL}}"></div>
		<script src="/.templates/user-conversations/resources/app/dist/app.js"></script>

	{{- end -}}

</div>
